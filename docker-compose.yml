services:

  backend:
    build: ./backend
    container_name: planalyze_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app          # hot reload — code changes reflect instantly
      - storage_data:/storage   # uploaded floor plan images persist here
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:15
    container_name: planalyze_db
    environment:
      POSTGRES_DB: planalyze
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"             # expose for local DB tools (TablePlus, DBeaver)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  storage_data: